<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Bulud Texnologiyaları - Taymerli və Serverli İmtahan</title>
    <style>
        :root { --primary: #2563eb; --secondary: #f59e0b; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .screen { display: none; }
        .active { display: block; }
        #timer-box { font-size: 24px; font-weight: bold; padding: 10px 20px; border-radius: 8px; background: #e2e8f0; text-align: center; }
        .timer-warning { color: var(--danger); animation: pulse 1s infinite; background: #fee2e2 !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .admin-panel { background: #fee2e2; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed var(--danger); }
        .nav-panel { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-bottom: 20px; }
        .nav-item { padding: 10px; border: 1px solid #ddd; text-align: center; cursor: pointer; border-radius: 4px; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item.answered { background: var(--success); color: white; }
        .option { background: #f1f5f9; border: 2px solid #e2e8f0; padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; }
        .option.selected { background: #dbeafe; border-color: var(--primary); }
        .stats-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: #f1f5f9; border-radius: 8px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin-top: 15px; }
        .btn-finish { background: var(--danger); color: white; width: 100%; margin-top: 20px; }
        .btn-skip { background: var(--secondary); color: white; width: 100%; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen" class="screen active">
        <h2 style="text-align:center">Bulud Texnologiyaları İmtahanı</h2>
        
        <div id="admin-zone" class="admin-panel" style="display:none;">
            <strong>Müəllim Paneli:</strong><br><br>
            Sualları Yenilə (.txt): <input type="file" id="fileInput" accept=".txt">
            <button onclick="uploadQuestions()" style="background:var(--success); color:white; padding:5px 10px;">Yüklə</button>
            <button style="background:var(--danger); color:white; padding:5px 10px; margin-left:10px;" onclick="clearLeaderboard()">Cədvəli Sıfırla</button>
        </div>

        <div style="margin: 30px 0;">
            <label>Tələbənin Adı və Soyadı:</label>
            <input type="text" id="username" style="width:100%; padding:12px; margin-top:8px; border:1px solid #ddd; border-radius:8px;">
            <button class="btn-main" onclick="startExam()">İmtahana Başla (5 dəqiqə)</button>
        </div>

        <h3>Liderlər Cədvəli (Yerli)</h3>
        <table>
            <thead><tr><th>Tələbə</th><th>Bal</th></tr></thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
        <center><small style="cursor:pointer; color:#ccc; margin-top:20px; display:block;" onclick="toggleAdmin()">⚙ Admin</small></center>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="stats-bar">
            <div>
                <div id="s-name" style="font-size: 18px; color: var(--primary);"></div>
                <div style="font-size: 12px; color: #666;">Haqq: <span id="s-skips">5</span> | Proqress: <span id="s-progress">0/20</span></div>
            </div>
            <div id="timer-box">05:00</div>
        </div>
        <div class="nav-panel" id="navPanel"></div>
        <div id="question-area">
            <h3 id="q-text"></h3>
            <div id="options-box"></div>
        </div>
        <div style="display:flex; margin-top:20px; gap: 10px;">
            <button style="flex:1; background:#64748b; color:white;" onclick="prevQ()">Geri</button>
            <button style="flex:1; background:#64748b; color:white;" onclick="nextQ()">İrəli</button>
        </div>
        <button id="skipBtn" class="btn-skip" style="margin-top:10px;" onclick="swapQuestion()">Sualı Dəyiş</button>
        <button class="btn-finish" onclick="confirmFinish()">İmtahanı Bitir</button>
    </div>
</div>

<script>
    // --- 1. SERVER URL (Google Sheets) ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwjjUa8gYm_a9Ii47bi1YcT1FZm02J-YRY0EFGc3lwBlzXITxuEYvyYJTmgfEo2Mic/exec'; 

    // --- 2. AIKEN SUALLARINIZI BURAYA YAPIŞDIRIN ---
    // Diqqət: Sualları ` ` işarələri (backtick) arasında saxlayın.
    const AIKEN_DATA = `
Bulud hesablamalarının tarixi inkişafında "Grid Computing" modelinin əsas rolu nədən ibarətdir?
A. İstifadəçilərin yalnız fərdi kompüterlərdən istifadəsinə şərait yaratmaq
B. Resursların mərkəzləşdirilmiş qaydada yalnız bir ofis daxilində paylanması
C. Coğrafi paylanmış resursların vahid superkompüter kimi istifadə edilməsi
D. İnternet şəbəkəsinin yalnız məlumat ötürülməsi üçün tətbiq olunması
ANSWER: C

NIST modelinə görə bulud hesablamalarının rəsmi tərifi hansı əsas amili vurğulayır?
A. Şəbəkə resurslarına minimum konfiqurasiya ilə rahat girişin təmini
B. Avadanlıqların yalnız fiziki olaraq müəssisə daxilində yerləşməsi
C. İstifadəçinin provayderlə hər dəfə şifahi razılığa gəlməsinin vacibliyi
D. İnternet xidmətlərinin yalnız ödənişli əsaslarla tətbiq edilməsi
ANSWER: A

"Distributed Computing" (Paylanmış hesablamalar) sistemlərinin təməl fəlsəfəsi nədir?
A. Böyük bir hesablama tapşırığını bir neçə müstəqil düyün arasında bölmək
B. Bütün proqram təminatlarını yalnız bir əməliyyat sistemi daxilində sıxmaq
C. İnternet bağlantısı olmadan məlumatların lokal diskdə arxivləşdirilməsi
D. Prosessorun daxili keş yaddaşını proqram vasitəsilə süni şəkildə artırmaq
ANSWER: A

Bulud texnologiyalarından əvvəl istifadə olunan Mainframe sistemlərin əsas çatışmazlığı nə idi?
A. Hesablama gücünün müasir fərdi kompüterlərdən çox aşağı olması faktı
B. Resursların istifadəçilər arasında dinamik və avtomatik paylana bilməməsi
C. Şəbəkə təhlükəsizliyi qaydalarının bu sistemlərdə ümumiyyətlə olmaması
D. Avadanlıqların ölçüsünün kiçik olması səbəbindən yaddaşın tez dolması
ANSWER: B

Bulud texnologiyasının "Utility Computing" konsepti ilə oxşarlığı hansı bənddə düzgün verilib?
A. İstifadə edilən resursların su və ya elektrik enerjisi kimi ödənilməsi
B. Avadanlıqların mülkiyyət hüququnun mütləq şəkildə müştəriyə keçməsi
C. Xidmətlərin yalnız dövlət tərəfindən idarə olunan şəbəkədə qurulması
D. Bütün hesablama proseslərinin yalnız ofis daxilində icra edilməsi
ANSWER: A

NIST tərifinə görə, buludun "On-demand self-service" xüsusiyyəti nəyi ləğv edir?
A. İstifadəçinin provayderlə mütləq insan interaksiyasına girmək ehtiyacını
B. Məlumatların ehtiyat nüsxəsinin (backup) gündəlik çıxarılması zərurətini
C. İnternet sürətinin provayder tərəfindən limitlənməsi texniki tələbini
D. Prosessorların texniki göstəricilərinin müştəri tərəfindən bilinməsini
ANSWER: A

Grid və Cloud texnologiyaları arasındakı fundamental fərq hansı bənddə təsvir olunub?
A. Grid daha çox elmi hesablamalara, Cloud isə biznes xidmətlərinə yönəlib
B. Grid texnologiyası yalnız simsiz şəbəkələr üzərində işləmək üçün qurulub
C. Cloud sistemlərində resursların virtualizasiya olunması mütləq deyil
D. Grid sistemləri Cloud-dan fərqli olaraq yalnız bir serverdən ibarətdir
ANSWER: A

Bulud hesablamalarının iqtisadi cəhətdən ən böyük üstünlüyü hansı variantda qeyd olunub?
A. Şirkətlərin ilkin kapital xərclərini (CapEx) əməliyyat xərclərinə çevirməsi
B. Bütün proqramların ömürlük lisenziyalarının bir dəfəyə alınması ehtiyacı
C. İnternet xərclərinin bulud provayderi tərəfindən tam qarşılanması öhdəliyi
D. Avadanlıqların təmiri üçün mütləq xüsusi texniki heyətin saxlanılması
ANSWER: A

Aşağıdakılardan hansı buludun "Broad Network Access" xüsusiyyətini ən yaxşı izah edir?
A. Xidmətlərin müxtəlif cihazlar və standart şəbəkə protokolları ilə əlçatanlığı
B. Şəbəkəyə girişin yalnız şirkətin daxili kabel sistemi ilə mümkün olması
C. İnternet provayderinin müştəriyə yalnız bir növ qoşulma kanalı verməsi
D. İstifadəçilərin eyni vaxtda yalnız bir cihazdan sistemə daxil ola bilməsi
ANSWER: A

"Resource Pooling" prinsipinin provayder üçün əsas texniki faydası nədən ibarətdir?
A. Fiziki resursların bir neçə müştəri arasında dinamik şəkildə bölüşdürülməsi
B. Hər bir müştəri üçün ayrı və müstəqil fiziki server otağının ayrılması işi
C. Məlumatların saxlanılması üçün yalnız bir növ diskdən istifadə edilməsi
D. Prosessorun bütün gücünün yalnız bir tətbiqə tam şəkildə həsr olunması
ANSWER: A

Buludun tarixi inkişafında virtualizasiya texnologiyasının rolu necə qiymətləndirilir?
A. Fiziki avadanlıqdan maksimum səmərəli istifadəni təmin edən təməl faktor
B. Şəbəkə sürətini süni şəkildə artırmaq üçün istifadə edilən köməkçi vasitə
C. Yalnız proqram təminatının dizaynını dəyişmək üçün nəzərdə tutulan alət
D. Məlumatların arxivləşdirilməsi üçün istifadə olunan daxili texniki kod
ANSWER: A

NIST-ə görə buludun "Measured Service" xüsusiyyəti hansı mexanizmi təmin edir?
A. İstifadə olunan resursların şəffaf monitorinqini və hesabatlılıq sistemini
B. İnternet kanalının genişliyinin yalnız provayder tərəfindən gizli saxlanmasını
C. Prosessorun temperaturunun hər dəqiqə istifadəçiyə bildiriş kimi göndərilməsini
D. Aylıq abunə haqqının istifadədən asılı olmayaraq həmişə eyni qalması işini
ANSWER: A

Real istifadə ssenarisi olaraq, bir startapın buludu seçməsinin ən mühüm səbəbi nədir?
A. Bazara çıxış sürətini (time-to-market) artırmaq və riskləri minimuma endirmək
B. Server avadanlıqlarının fiziki mülkiyyətinə dərhal sahib olmaq istəyi
C. Şirkətin ofisindəki elektrik sərfiyyatını süni şəkildə artırmaq məqsədi
D. Bütün işçilərin yalnız eyni marka kompüterlərdən istifadə etmək məcburiyyəti
ANSWER: A

Paylanmış sistemlərdə (Distributed Systems) "Transparency" anlayışı nəyi ifadə edir?
A. İstifadəçinin resursların harada yerləşməsini bilmədən vahid sistem kimi görməsi
B. Bütün proqram kodlarının internetdə hər kəs üçün açıq şəkildə yayımlanması
C. Şəbəkə kabellərinin fiziki olaraq şəffaf materialdan hazırlanması texnikası
D. Server otağındakı kameraların bütün gün canlı yayımlanması tələbi işi
ANSWER: A

Buludun "Rapid Elasticity" xüsusiyyəti biznesə hansı üstünlüyü qazandırır?
A. Ani tələb artımı zamanı resursların avtomatik olaraq dərhal genişlənməsini
B. Şirkətin internet sürətinin hər ay mütləq şəkildə iki dəfə artırılması vədini
C. İstifadəçi şifrələrinin hər həftə sonu sistem tərəfindən dəyişdirilməsi imkanını
D. Serverlərin yerləşdiyi binaların zəlzələyə qarşı elastik materialdan qurulmasını
ANSWER: A

Tarixi baxımdan "SaaS" modelinin ilk nümunələri hansı xidmət növü ilə bağlıdır?
A. ASP (Application Service Provider) tərəfindən təklif olunan uzaqdan giriş
B. Kompüterlərin daxili hissələrinin uzaqdan təmiri üçün nəzərdə tutulan proqram
C. Şəbəkə kabellərinin rəqəmsal formatda simulyasiya edilməsi prosesi işi
D. Monitorların parlaqlığını internet üzərindən idarə edən mərkəzi sistem
ANSWER: A

Thomas Erl-ə görə buludun "Multi-tenancy" xüsusiyyəti nə deməkdir?
A. Bir neçə istifadəçinin eyni proqram instansiyasından birgə istifadə etməsi
B. Bir istifadəçinin eyni vaxtda bir neçə müxtəlif bulud provayderi ilə işləməsi
C. Serverlərin yalnız tələbələr tərəfindən təcrübə məqsədilə idarə olunması
D. Məlumatların yalnız bir fiziki disk daxilində şifrəsiz şəkildə saxlanması
ANSWER: A

"Pervasive Computing" anlayışının buludla əlaqəsi hansı variantda düzgün verilib?
A. İnternetə qoşulan cihazların hər yerdə olması və buluda bağlılığı
B. Kompüterlərin yalnız bir mərkəzi laboratoriya daxilində işləməsi
C. Bulud xidmətlərinin yalnız inkişaf etmiş ölkələrdə fəaliyyət göstərməsi
D. Şəbəkə təhlükəsizliyinin yalnız bir antivirus proqramı ilə təmin olunması
ANSWER: A

"Time-sharing" konsepti bulud texnologiyalarına necə təsir göstərmişdir?
A. Çoxlu istifadəçinin eyni resursdan eyni vaxtda yararlanma imkanını yaratdı
B. İnternet sürətinin yalnız gecə saatlarında artırılması qaydasını gətirdi
C. Prosessorun işləmə müddətinin yalnız saniyəölçənlə ölçülməsi tələbini qoydu
D. İşçilərin işə gəlmə saatlarının bulud tərəfindən qeydə alınmasını təmin etdi
ANSWER: A

Buludun "Service-Oriented Architecture" (SOA) ilə əlaqəsi nədən ibarətdir?
A. Xidmətlərin təkrar istifadə edilə bilən müstəqil komponentlər kimi qurulması
B. Şirkət rəhbərliyinin yalnız bir növ xidmətdən istifadə etmək məcburi qərarı
C. Şəbəkə təhlükəsizlik divarlarının (firewall) fiziki olaraq ləğv edilməsi işi
D. Bütün bulud xidmətlərinin yalnız eyni proqramlaşdırma dilində yazılması
ANSWER: A

Sosinsky-ə görə buludda "Scalability" (Miqyaslılıq) nəyi ifadə edir?
A. Artan yükü qarşılamaq üçün sistemin öz imkanlarını artırmaq qabiliyyətini
B. Serverlərin fiziki ölçüsünün xüsusi alətlərlə böyüdülməsi prosesini işi
C. Şəbəkəyə qoşulan cihazların markasının mütləq sistemə uyğun olması tələbi
D. İstifadəçilərin sayını hər il mütləq şəkildə sabit saxlamaq üçün görülən iş
ANSWER: A

Bulud infrastrukturunda "Abstraction" (Mücərrədləşdirmə) nə üçün lazımdır?
A. İstifadəçini aşağı səviyyəli texniki mürəkkəbliklərdən tam azad etmək üçün
B. Məlumatların daxili strukturunun hər kəs tərəfindən asanlıqla oxunması üçün
C. Serverlərin yerləşdiyi yerin koordinatlarını hər bir müştəriyə gizli bildirmək
D. Proqram təminatının interfeysindəki rəngləri daha şəffaf və sadə etmək
ANSWER: A

"Vendor Lock-in" problemi bulud sənayesində nəyi ifadə edir?
A. Müştərinin bir provayderin texnologiyasından digərinə keçməkdə çətinliyi
B. Mağazada satılan bulud avadanlıqlarının qutularının qıfıllanması vəziyyəti
C. Provayderin öz işçilərini ofis daxilində məcburi şəkildə saxlaması halı
D. İnternet sürətinin yalnız bir ölkə tərəfindən tam nəzarətdə saxlanması
ANSWER: A

Buludun tətbiq sahələrindən olan "Disaster Recovery" ssenarisi nəyi nəzərdə tutur?
A. Qəza zamanı məlumatların və xidmətlərin dərhal bərpa edilməsini
B. Şirkətin yalnız sığorta sənədlərinin buludda rəqəmsal arxivləşdirilməsini
C. Kompüterin monitoru qırılan zaman onun avtomatik yenisi ilə əvəzlənməsini
D. Təbii fəlakət zamanı serverlərin yerinin işçilər tərəfindən əllə dəyişməsini
ANSWER: A

NIST modelində qeyd olunan "Resource Pooling" xüsusiyyəti hansı resurslara aiddir?
A. Şəbəkə, server, yaddaş, tətbiq və servis kimi bütün virtual resurslara
B. Yalnız ofis daxilindəki mebellərin və dəftərxana ləvazimatlarının siyahısına
C. Şirkətin bank hesabındakı pul vəsaitlərinin bulud üzərindən idarəsinə
D. İşçilərin şəxsi telefonlarının yaddaş kartlarında olan fotoşəkil bazasına
ANSWER: A

Buludun "On-demand self-service" xüsusiyyəti praktiki olaraq nəyi ifadə edir?
A. İstifadəçinin provayderlə insan təması olmadan resursları idarə etməsini
B. Şəbəkə sürətinin yalnız provayderin texniki heyəti tərəfindən artırılmasını
C. Bütün bulud xidmətlərinin yalnız iş günlərində və saatlarında aktiv olmasını
D. Resursların alınması üçün mütləq yazılı müraciət formasının tələb edilməsini
ANSWER: A

"Broad network access" prinsipi bulud istifadəçisinə hansı imkanı yaradır?
A. Müxtəlif cihazlarla standart mexanizmlər üzərindən şəbəkəyə daxil olmağı
B. Şəbəkə resurslarının yalnız bir coğrafi bina daxilində məhdudlaşdırılmasını
C. İnternetə qoşulma xərclərinin tamamilə provayder tərəfindən ödənilməsi işini
D. Yalnız bir növ əməliyyat sistemi vasitəsilə mərkəzi serverə qoşulma qaydasını
ANSWER: A

"Resource pooling" xüsusiyyətinin əsas texniki mahiyyəti nədən ibarətdir?
A. Fiziki resursların bir neçə müştəri arasında dinamik şəkildə bölünməsindən
B. Hər bir müştəri üçün ayrıca və müstəqil fiziki server avadanlığının alınmasından
C. Məlumatların saxlanılması üçün yalnız bir növ disk texnologiyasından istifadədən
D. Prosessorun bütün gücünün yalnız bir istifadəçiyə tam şəkildə həsr olunmasından
ANSWER: A

Buludda "Rapid elasticity" (Sürətli çeviklik) xüsusiyyəti nəyə xidmət edir?
A. Resursların tələbə uyğun olaraq dərhal genişlənməsinə və ya kiçilməsinə
B. Şirkətin internet sürətinin hər ay sabit şəkildə iki dəfə artırılması vədinə
C. İstifadəçi şifrələrinin hər gün sistem tərəfindən avtomatik dəyişdirilməsinə
D. Serverlərin yerləşdiyi binaların zəlzələyə davamlı materialdan qurulması işinə
ANSWER: A

"Measured service" (Ölçülən xidmət) prinsipi iqtisadi cəhətdən nəyi təmin edir?
A. İstifadəçinin yalnız faktiki istifadə etdiyi resurs miqdarı qədər ödəniş etməsini
B. Aylıq abunə haqqının resurs istifadəsindən asılı olmayaraq həmişə sabit qalmasını
C. Şəbəkə trafikinin provayder tərəfindən heç bir ölçü aparılmadan təqdim edilməsini
D. Avadanlıqların texniki nasazlıqlarının istifadəçi tərəfindən pulsuz təmirini
ANSWER: A

Thomas Erl-ə görə "Multi-tenancy" memarlıq prinsipinin əsas üstünlüyü nədir?
A. Bir neçə müstəqil istifadəçinin eyni fiziki resursdan ortaq şəkildə yararlanması
B. Hər bir müştərinin eyni vaxtda bir neçə fərqli bulud provayderi ilə işləməsi işi
C. Məlumatların yalnız bir ölkənin daxili qanunvericiliyinə uyğun saxlanması tələbi
D. Proqram təminatının hər bir müştəri üçün fərdi kodlarla yenidən yazılması prosesi
ANSWER: A

"Scalability" (Miqyaslılıq) anlayışı bulud infrastrukturunda nəyi ifadə edir?
A. Sistemin artan iş yükünü qarşılamaq üçün öz imkanlarını genişləndirmə qabiliyyətini
B. Serverlərin fiziki ölçülərinin xüsusi mexanizmlər vasitəsilə böyüdülməsi prosesini
C. Şəbəkəyə qoşulan cihazların markasının mütləq mərkəzi sistemə uyğun olması şərtini
D. İstifadəçilərin sayını hər il mütləq şəkildə sabit saxlamaq üçün görülən texniki işi
ANSWER: A

Buludda "Ubiquitous network access" dedikdə hansı mühit nəzərdə tutulur?
A. Xidmətlərin hər yerdə və hər hansı bir cihazla əlçatan olması vəziyyəti
B. Şəbəkəyə girişin yalnız şirkətin baş ofisindəki mərkəzi otaqdan mümkünlüyü
C. İnternet provayderinin müştəriyə yalnız bir növ uzaqdan giriş kanalı verməsi
D. İstifadəçilərin eyni vaxtda yalnız tək bir mobil cihazdan sistemə daxil olması
ANSWER: A

"Location independence" (Məkandan asılı olmamaq) prinsipi müştəriyə nə vəd edir?
A. Resursların dəqiq yerini bilmədən onlara hər yerdən müdaxilə etmək imkanını
B. Serverlərin yerləşdiyi otağın coğrafi koordinatlarının müştəriyə gizli verilməsini
C. İstifadəçinin yalnız öz yaşadığı şəhər daxilində bulud xidmətlərindən yararlanmasını
D. Şəbəkə kabellərinin mütləq şəkildə müştərinin evinə qədər fiziki çəkilməsi tələbini
ANSWER: A

Buludun "Elasticity" xüsusiyyəti "Scalability" anlayışından nə ilə fərqlənir?
A. Resursların həm artma, həm də azalma dinamikasının avtomatik olması ilə
B. Yalnız yaddaş həcminin artırılması üçün istifadə olunan daxili texniki kodla
C. İstifadəçilərin sayının proqram vasitəsilə süni şəkildə məhdudlaşdırılması ilə
D. Şəbəkə təhlükəsizliyinin mütləq mərkəzi bir antivirus proqramı ilə təmini ilə
ANSWER: A

"Self-provisioning" anlayışı buludun hansı xüsusiyyəti ilə birbaşa əlaqəlidir?
A. On-demand self-service prinsipi ilə istifadəçinin özünə xidmət göstərməsi
B. Proqram təminatının yeni versiyalarının mütləq provayder tərəfindən yüklənməsi
C. İnternet sürətinin gün ərzində bir neçə dəfə avtomatik olaraq aşağı düşməsi işi
D. Serverlərin hər həftə sonu texniki baxış üçün məcburi şəkildə söndürülməsi rejimi
ANSWER: A

Resource Pooling zamanı "Virtualization" texnologiyasının əsas rolu nədir?
A. Fiziki resursları abstraksiya edərək onları müştərilər arasında bölüşdürmək
B. İnternet kanalının genişliyini yalnız provayderin daxili şəbəkəsi üçün saxlamaq
C. Prosessorun temperaturunu hər saniyə istifadəçiyə qrafik şəklində göndərmək işi
D. Aylıq ödənişlərin məbləğini istifadəçinin bank hesabına uyğun olaraq gizlətmək
ANSWER: A

"Usage-based billing" (İstifadəyə əsaslanan hesablaşma) hansı prinsipin nəticəsidir?
A. Measured service xüsusiyyəti sayəsində resurs sərfinin dəqiq ölçülməsinin
B. Şirkətin rəhbərliyinin hər ay sabit miqdarda xidmət haqqı ödəmək qərarının
C. İnternet paketlərinin bitməsi barədə istifadəçiyə səsli bildirişlərin göndərilməsinin
D. Serverlərin istifadə müddətinin yalnız xüsusi mexaniki saatlarla qeydə alınmasının
ANSWER: A

Multi-tenancy mühitində "Isolation" (Təcridetmə) nə üçün kritik əhəmiyyət kəsb edir?
A. Bir müştərinin məlumatlarının digər müştəri tərəfindən görülməməsi üçün
B. İstifadəçilərin yalnız eyni marka kompüterlərdən istifadə etməsini təmin etmək
C. Şirkətin daxili yazışmalarının yalnız kağız üzərində aparılmasını tələb etmək
D. İnternet bağlantısı kəsildiyi zaman bütün məlumatların avtomatik silinməsi üçün
ANSWER: A

Buludda "Workload distribution" (İş yükünün paylanması) prinsipi nəyi təmin edir?
A. Hesablama tapşırıqlarının bir neçə aktiv resurs arasında bərabər bölünməsini
B. İşçilərin gün ərzində kompüter qarşısında keçirdikləri vaxtın mərkəzi uçotunu
C. Prosessorun daxili tezliyinin yalnız bir tətbiq üçün maksimuma qaldırılmasını
D. Şəbəkəyə qoşulan cihazların sayının proqram vasitəsilə mütləq azaldılmasını
ANSWER: A

"Resiliency" (Dözümlülük) prinsipi bulud memarlığında nəyi ifadə edir?
A. Sistemin nasazlıq və ya xətadan sonra dərhal bərpa olunma qabiliyyətini
B. Serverlərin yerləşdiyi otağın rütubət səviyyəsinin həmişə sabit saxlanılmasını
C. İstifadəçilərin sistemə giriş şifrələrinin mütləq 20 simvoldan çox olması tələbi
D. Şəbəkə kabellərinin fiziki olaraq yanğına davamlı materialdan hazırlanması işi
ANSWER: A

Buludda "Pay-as-you-go" modeli hansı əsas xüsusiyyətə söykənir?
A. Measured service (Ölçülən xidmət) prinsipi ilə dəqiq hesablaşma aparılmasına
B. Xidmətlərin yalnız əvvəlcədən ödəniş edildiyi halda aktiv edilməsi qaydasına
C. İnternet sürəti artdıqca ödəniş məbləğinin avtomatik olaraq aşağı düşməsi işinə
D. Serverlərin mülkiyyət hüququnun hər ay bir neçə müştəri arasında paylanmasına
ANSWER: A

"On-demand" anlayışı bulud xidmətlərində hansı vaxt çərçivəsini nəzərdə tutur?
A. Resursların ehtiyac yarandığı andan dərhal və ya çox qısa müddətdə verilməsini
B. İstifadəçinin müraciətindən ən azı üç iş günü keçdikdən sonra xidmət açılmasını
C. Şəbəkə resurslarının yalnız gecə saatlarında daha sürətli işləməsi rejimini
D. Prosessor gücünün hər ay yalnız bir dəfə müştəriyə təqdim edilməsi planını
ANSWER: A

Resource Pooling zamanı resurslar müştərilərə necə təqdim olunur?
A. Müştərinin tələbinə uyğun olaraq mücərrəd və virtual resurslar şəklində
B. Fiziki disk və prosessorun müştərinin ofisinə kuryerlə göndərilməsi vasitəsilə
C. Yalnız bir istifadəçinin icazəsi olduğu halda digər istifadəçilərə paylanmaqla
D. Şəbəkə kanalının bütün istifadəçilər üçün mütləq şəkildə qapalı saxlanılması ilə
ANSWER: A

Broad Network Access xüsusiyyətində "Heterogeneous devices" nəyi ifadə edir?
A. Müxtəlif növ və markalı cihazların (mobil, planşet, PC) buluda qoşula bilməsini
B. Yalnız eyni istehsalçı tərəfindən hazırlanan cihazların bir-birini tanıması işini
C. Cihazların daxili hissələrinin mütləq fərqli metallardan hazırlanması tələbini
D. İnternetə qoşulmaq üçün hər bir cihazın xüsusi lisenziya alması zərurətini
ANSWER: A

Buludun "Rapid elasticity" xüsusiyyəti olmasaydı, şirkətlər hansı çətinliklə üzləşərdi?
A. Ani yük artımı zamanı sistemin çökməsi və ya resurs çatışmazlığı problemi ilə
B. İstifadəçi şifrələrinin yadda saxlanılması üçün əlavə dəftərlərin tutulması ilə
C. İnternet sürətinin hər gün mütləq şəkildə mühəndislər tərəfindən ölçülməsi ilə
D. Kompüter monitorlarının rənglərinin proqram vasitəsilə tənzimlənə bilməməsi ilə
ANSWER: A

Multi-tenancy modelində provayderin əsas məqsədi nədir?
A. Resurslardan istifadə səmərəliliyini artırmaq və xərcləri optimallaşdırmaq
B. Müştərilərin sayını mütləq şəkildə bir nəfərlə məhdudlaşdırıb idarə etmək
C. Şəbəkəyə qoşulan cihazların hamısını eyni marka ilə əvəz etmək işi
D. Serverlərin yerləşdiyi otağa müştərilərin daxil olmasına icazə vermək
ANSWER: A

"Resource Pooling" xüsusiyyətində "Abstraction" (Mücərrədləşdirmə) nə üçün lazımdır?
A. Müştərini fiziki avadanlığın mürəkkəb texniki idarəetməsindən uzaq tutmaq üçün
B. Məlumatların daxili şifrələrinin hər bir işçi tərəfindən asanlıqla oxunması üçün
C. Serverlərin yerləşdiyi binanın dəqiq xəritəsini internetdə hər kəsə göstərmək üçün
D. Proqram təminatının interfeysindəki düymələrin sayını proqram vasitəsilə artırmaq
ANSWER: A

"Measured service" zamanı hansı resurslar adətən monitorinq edilir?
A. Prosessor yükü, yaddaş həcmi, şəbəkə trafiki və aktiv istifadəçi hesabları
B. Şirkət işçilərinin gün ərzində içdikləri suyun miqdarı və nahar fasilələri
C. Ofis mebellərinin köhnəlmə dərəcəsi və otaqların təmizlik səviyyəsi ölçüsü
D. Klaviatura düymələrinə saniyə ərzində basılma sayının ümumi orta hesabı
ANSWER: A

NIST modelində qeyd olunan 5 əsas xüsusiyyət buluda hansı statusu verir?
A. Onu ənənəvi İT infrastrukturundan fərqləndirən rəsmi standart statusunu
B. Xidmətlərin yalnız pulsuz olaraq paylanması barədə olan tövsiyə statusunu
C. İnternet sürətinin hər bir ölkədə eyni olması haqqında olan dövlət qərarını
D. Serverlərin mütləq yaşıl rəngli kabellərlə qoşulması barədə olan texniki sənədi
ANSWER: A

IaaS (İnfrastruktur xidmət modeli) zamanı provayderin əsas məsuliyyət zonasına nə daxildir?
A. Fiziki serverlərin, şəbəkə avadanlıqlarının və soyutma sistemlərinin idarəsi
B. Müştərinin virtual maşın daxilində quraşdırdığı tətbiqi proqramların kodu
C. İstifadəçi məlumatlarının daxili strukturu və verilənlər bazasının dizaynı
D. Əməliyyat sisteminin daxili təhlükəsizlik yenilənmələrinin mütləq icrası
ANSWER: A

SaaS (Proqram təminatı xidmət modeli) modelində müştəri üçün idarəetmə səviyyəsi necədir?
A. Müştəri yalnız proqramın funksional tənzimləmələrinə və istifadəsinə cavabdehdir
B. Müştəri virtual maşınların sayını və prosessor gücünü fərdi olaraq tənzimləyir
C. Əməliyyat sisteminin nüvə (kernel) parametrləri müştəri tərəfindən idarə olunur
D. Fiziki yaddaş qurğularının RAID konfiqurasiyası müştəri tərəfindən müəyyən edilir
ANSWER: A

PaaS (Platforma xidmət modeli) hansı növ istifadəçi qrupu üçün ən əlverişli seçimdir?
A. İnfrastruktur qayğısı çəkmədən birbaşa kod yazmaq istəyən proqram tərtibatçıları
B. Kompüter avadanlıqlarının fiziki təmiri ilə məşğul olan texniki mühəndislər
C. Şirkətin yalnız maliyyə və mühasibat işlərini aparan sıravi ofis əməkdaşları
D. Şəbəkə kabellərinin çəkilməsi və montajı ilə məşğul olan sahə mütəxəssisləri
ANSWER: A

"Shared Responsibility Model" (Ortaq məsuliyyət) IaaS modelində müştəriyə hansı vəzifəni qoyur?
A. Əməliyyat sisteminin, tətbiqlərin və məlumatların təhlükəsizliyini təmin etmək
B. Data mərkəzindəki fiziki serverlərin tozdan təmizlənməsi işini təşkil etmək
C. Elektrik kəsilməsi zamanı generatorların işə düşməsini mərkəzdən idarə etmək
D. Binanın yanğın təhlükəsizliyi sistemlərinin illik monitorinqini həyata keçirmək
ANSWER: A

SaaS modelinin tətbiqinə dair ən geniş yayılmış real ssenari hansı bənddə düzgün verilib?
A. E-poçt xidmətləri (Gmail) və ya onlayn ofis tətbiqlərinin (Office 365) istifadəsi
B. Virtual serverlərin daxilində sıfırdan yeni bir əməliyyat sisteminin qurulması
C. Proqramçıların özləri üçün fərdi verilənlər bazası mühiti hazırlaması prosesi
D. Şəbəkə routerlərinin proqram təminatının mühəndislər tərəfindən yenilənməsi
ANSWER: A

Xidmət modelləri arasında "Abstraction" (Mücərrədləşdirmə) səviyyəsi ən yüksək olan hansıdır?
A. İstifadəçinin bütün texniki detallardan tam uzaq olduğu SaaS xidmət modeli
B. Müştərinin virtual infrastrukturu özünün idarə etdiyi IaaS yerləşdirmə növü
C. Tərtibatçılar üçün nəzərdə tutulan inkişaf mühitini təklif edən PaaS sistemi
D. Fiziki serverlərin icarəyə götürülərək ofisə gətirildiyi ənənəvi xidmət növü
ANSWER: A

PaaS modelinin istifadəsi zamanı yaranan "Vendor Lock-in" riski nəyi ifadə edir?
A. Yazılmış kodun başqa provayderin platformasına keçirilməsinin çətin olmasını
B. Provayderin ofisindəki qapıların müştərilərin üzünə bağlanması texniki xətası
C. İnternet sürətinin proqram vasitəsilə mütləq şəkildə aşağı salınması vəziyyəti
D. İstifadəçinin şifrəsinin sistem tərəfindən qəsdən bloklanması və silinməsi işi
ANSWER: A

IaaS modelində "Virtual Machine" (VM) anlayışı hansı komponenti əvəz edir?
A. Əvvəllər şirkətlərin aldığı fiziki server avadanlıqlarını və infrastrukturunu
B. Müştərilərin istifadə etdiyi monitor və klaviatura kimi giriş-çıxış qurğularını
C. Şəbəkə mühəndislərinin gündəlik olaraq yazdığı kağız üzərindəki hesabatları
D. Data mərkəzində çalışan mühafizəçilərin istifadə etdiyi nəzarət kameralarını
ANSWER: A

Aşağıdakılardan hansı SaaS modelinin ən mühüm iqtisadi üstünlüklərindən biridir?
A. Proqramın lisenziya və infrastruktur xərclərinin vahid abunə haqqına daxil olması
B. Müştərinin proqramın hər bir yeni versiyası üçün ayrıca tam ödəniş etməsi tələbi
C. İnternet provayderinə ödənilən aylıq vəsaitin SaaS şirkəti tərəfindən qarşılanması
D. Şirkət işçilərinin kompüterlərinin hər il pulsuz yenisi ilə əvəzlənməsi vədi
ANSWER: A

PaaS modelində "Runtime" mühiti dedikdə Erl-ə görə nə nəzərdə tutulur?
A. Proqram kodunun icra edilməsi üçün hazır və sazlanmış texniki mühit qatı
B. İşçilərin işə gəlmə vaxtını saniyələr daxilində ölçən mərkəzi nəzarət saatı
C. Serverin elektrik enerjisi ilə təmin olunma müddətini göstərən rəqəmsal lövhə
D. Proqram təminatının interfeysindəki düymələrin hərəkət sürətini ölçən daxili kod
ANSWER: A

Sosinsky-ə görə IaaS modelində "Scalability" necə həyata keçirilir?
A. Ehtiyac yarandıqda yeni virtual serverlərin və yaddaşın dərhal əlavə edilməsi ilə
B. Fiziki serverlərin içindəki detalların mühəndislər tərəfindən əllə dəyişməsi ilə
C. İnternetə qoşulan cihazların sayını proqram vasitəsilə süni şəkildə artırmaqla
D. Şirkətin ofis binasının ölçüsünün genişləndirilməsi barədə qərarın alınması ilə
ANSWER: A

SaaS modelində təhlükəsizlik baxımından ən böyük risk hansı hesab edilir?
A. Məlumatların müştərinin tam nəzarətindən kənarda, provayder tərəfdə saxlanması
B. Proqram təminatının interfeys rənglərinin tələbə tərəfindən bəyənilməməsi ehtimalı
C. İnternetə qoşulan kompüterlərin klaviatura düymələrinin tez sıradan çıxması işi
D. Server otağındakı işıqların çox parlaq olması səbəbindən yaranan texniki xəta
ANSWER: A

IaaS, PaaS və SaaS modellərini bir-birindən fərqləndirən əsas amil hansıdır?
A. İdarəetmə və məsuliyyətin provayder ilə müştəri arasında bölünmə nisbəti
B. Serverlərin hansı marka prosessorlar vasitəsilə yığılması barədə olan məlumat
C. Xidmətlərin yalnız günün müəyyən saatlarında aktiv olması barədə olan qayda
D. Şəbəkə kabellərinin rənginin proqramın işləmə sürətinə göstərdiyi təsir dərəcəsi
ANSWER: A

Real ssenari: Bir proqramçı Python dilində yazdığı kodu tez bir zamanda sınaqdan keçirmək üçün hansı modeli seçməlidir?
A. Konfiqurasiya ilə vaxt itirməmək üçün inkişaf mühiti təklif edən PaaS modelini
B. Fiziki server alıb onu ofisdə quraşdırmaqla məşğul olan ənənəvi İT metodunu
C. Yalnız hazır proqramların istifadəsi üçün nəzərdə tutulan SaaS xidmət növünü
D. Şəbəkə kabellərinin uclarını birləşdirməklə məşğul olan texniki infrastruktur işini
ANSWER: A

IaaS modelində "Compute" resursu dedikdə nə başa düşülür?
A. Virtual mərkəzi prosessor (vCPU) və operativ yaddaşın (RAM) təqdim edilməsi
B. Şirkətin mühasibatlıq proqramında aparılan bütün riyazi hesablamaların siyahısı
C. Data mərkəzindəki mühəndislərin aylıq maaşlarının hesablanması üçün olan cədvəl
D. Kompüterin monitorundakı piksellərin sayını avtomatik hesablayan daxili alət
ANSWER: A

PaaS modelində provayder aşağıdakılardan hansını idarə edir?
A. Şəbəkə infrastrukturunu, əməliyyat sistemini və verilənlər bazası mühitini
B. Müştərinin sistemə daxil etdiyi şəxsi faylların məzmununu və gizli kodlarını
C. Proqramçının yazdığı tətbiqi proqramın daxili məntiqini və alqoritmlərini
D. Ofis daxilindəki istifadəçilərin hansı növ siçan və klaviatura işlətməsini
ANSWER: A

"Everything-as-a-Service" (XaaS) konsepti nəyi ifadə edir?
A. Bulud üzərindən hər hansı bir texnoloji resursun xidmət kimi təqdim olunmasını
B. Mağazada satılan bütün elektron cihazların qiymətinin eyni olması vəziyyətini
C. Şirkətin bütün mebel və avadanlıqlarının mütləq internetə qoşulması tələbini
D. Dünyadakı bütün insanların eyni vaxtda eyni proqramdan istifadə etməsi işini
ANSWER: A

SaaS modelində proqram təminatının yenilənməsi (Update) necə baş verir?
A. Provayder tərəfindən mərkəzləşdirilmiş qaydada və bütün müştərilər üçün eyni vaxtda
B. Hər bir istifadəçinin öz kompüterinə yeni faylları disk vasitəsilə yükləməsi ilə
C. İnternet sürətinin hər dəfə aşağı düşdüyü zaman sistemin özünü söndürməsi ilə
D. Şirkət rəhbərliyinin xüsusi əmri ilə proqramın kodlarının əllə dəyişdirilməsi ilə
ANSWER: A

IaaS modelinin "Pay-per-use" mexanizmi müştəriyə nəyə görə sərfəlidir?
A. İstifadə edilməyən resurslar üçün pul ödəməyib xərclərə qənaət etdiyi üçün
B. Xidmət haqqının hər il mütləq şəkildə iki dəfə aşağı düşəcəyinə inandığı üçün
C. Provayderin ona hər ay pulsuz olaraq yeni prosessor hədiyyə etdiyi üçün
D. Şəbəkəyə qoşulan cihazların sayını proqram vasitəsilə gizlədə bildiyi üçün
ANSWER: A

"Middleware" anlayışı bulud xidmət modellərində ən çox hansı səviyyədə rast gəlinir?
A. Əməliyyat sistemi ilə tətbiq arasında vasitəçi qat rolunu oynayan PaaS modelində
B. Fiziki kabellərin bir-birinə bağlanması prosesini idarə edən IaaS səviyyəsində
C. İstifadəçinin yalnız brauzerlə daxil olduğu ən yuxarı SaaS proqram səviyyəsində
D. Server otağındakı generatorların yağının dəyişdirilməsi zamanı olan texniki işdə
ANSWER: A

IaaS xidmətindən istifadə edən şirkət üçün "Hardware Refresh" (Avadanlıq yenilənməsi) necə olur?
A. Şirkət bu barədə düşünmür, köhnəlmiş avadanlıqları provayder özü yeniləyir
B. Şirkət işçiləri data mərkəzinə gedərək köhnə diskləri yeniləri ilə əvəz edirlər
C. İnternet vasitəsilə hər bir işçinin kompüterinin yaddaşı süni şəkildə artırılır
D. Serverlərin yerləşdiyi otağın divarlarının rəngi hər il yenidən rənglənir
ANSWER: A

SaaS modelində "Multi-tenancy" necə tətbiq olunur?
A. Bir tətbiq instansiyasının məlumat bazası səviyyəsində müştərilər arasında bölünməsi
B. Hər bir müştərinin öz ofisində ayrı bir proqram mühiti qurması məcburiyyəti ilə
C. Şəbəkəyə qoşulan cihazların mütləq şəkildə eyni marka və modeldən olması ilə
D. Proqramın daxili kodlarının hər bir müştəri üçün fərdi dildə yenidən yazılması ilə
ANSWER: A

"PaaS" istifadə edərkən "Infrastructure Management" qayğısı kimin üzərinə düşür?
A. Tamamilə bulud provayderinin üzərinə, müştəri bu işlərlə məşğul olmur
B. Müştərinin ofisində çalışan sistem inzibatçılarının və mühəndislərin üzərinə
C. İnternet xidmətini təmin edən yerli rabitə müəssisəsinin texniki heyəti üzərinə
D. Proqramı istifadə edən hər bir son istifadəçinin fərdi şəkildə öz üzərinə
ANSWER: A

IaaS modelinin mənfi cəhəti kimi göstərilən "Technical Expertise" tələbi nə deməkdir?
A. Virtual maşınları və əməliyyat sistemlərini idarə etmək üçün mütəxəssis lazımdır
B. Şirkət işçilərinin hər birinin mütləq şəkildə ingilis dilini mükəmməl bilməsi tələbi
C. Kompüterlərin daxili hissələrini təmizləmək üçün xüsusi sertifikatın olması zərurəti
D. İnternetə qoşulan zaman hər dəfə mürəkkəb riyazi məsələlərin həll edilməsi şərti
ANSWER: A

Bulud modelləri arasında "Cost Predictability" (Xərclərin öncədən bilinməsi) ən asan hansındadır?
A. Sabit aylıq və ya illik abunə haqqı təklif edən SaaS modelində
B. Resurs istifadəsi hər saniyə dəyişən mürəkkəb IaaS infrastruktur sistemində
C. Proqramçıların yazdığı kodun həcminə görə qiymət dəyişən PaaS platformasında
D. Ofisdəki kompüterlərin sayına görə cərimələrin tətbiq edildiyi köhnə İT metodunda
ANSWER: A

"Public Cloud" (İctimai bulud) modelinin əsas iqtisadi xüsusiyyəti nədən ibarətdir?
A. Resursların bir provayder tərəfindən çoxsaylı müştərilərə internet üzərindən satılması
B. İnfrastrukturun qurulması üçün şirkətin ilkin olaraq böyük investisiyalar etməsi
C. Avadanlıqların yalnız dövlət büdcəsi hesabına alınaraq pulsuz paylanması işi
D. Serverlərin mülkiyyət hüququnun mütləq şəkildə son istifadəçiyə ötürülməsi
ANSWER: A

"Private Cloud" (Özəl bulud) modelini ictimai buluddan fərqləndirən əsas amil hansıdır?
A. İnfrastrukturun yalnız bir təşkilatın daxili ehtiyacları üçün ayrılmış olması
B. Resursların dünyanın istənilən yerindən hər kəs üçün tam açıq şəkildə olması
C. Şəbəkə sürətinin provayder tərəfindən hər gün mütləq şəkildə artırılması vədi
D. Serverlərin yerləşdiyi otağın açarlarının bütün dünya dövlətlərinə verilməsi
ANSWER: A

"Hybrid Cloud" modelinin tətbiqi biznesə hansı texniki üstünlüyü qazandırır?
A. Həssas məlumatları daxildə saxlayıb, digər işləri ictimai buluda ötürmək imkanını
B. Şirkətin bütün İT xərclərini mütləq şəkildə sıfıra endirmək üçün istifadə edilməsini
C. İnternetə qoşulan cihazların sayını proqram vasitəsilə süni şəkildə artırmaq işini
D. Bütün dünyadakı serverlərin eyni vaxtda mütləq bir-birinə kopyalanması vəzifəsini
ANSWER: A

"Community Cloud" (İcma buludu) modelinin əsas məqsədi hansı bənddə düzgün izah edilib?
A. Oxşar tələbləri və missiyaları olan bir neçə təşkilatın ortaq infrastruktur istifadəsi
B. Bir ailənin üzvləri arasında şəkillərin paylaşılması üçün qurulan kiçik yerli şəbəkə
C. Dünyadakı bütün insanların eyni vaxtda daxil ola bildiyi tam anonim mərkəzi baza
D. Şəbəkə kabellərinin yalnız müəyyən bir kənd və ya qəsəbə daxilində çəkilməsi işi
ANSWER: A

İctimai bulud modelində "Multi-tenancy" anlayışı təhlükəsizlik üçün hansı riski yaradır?
A. Eyni fiziki resursu paylaşan digər müştərilərin məlumatlarına qeyri-qanuni giriş ehtimalı
B. İnternet provayderinin aylıq faturanı qəsdən daha baha qiymətə müştəriyə göndərməsi
C. Server otağındakı işıqların çox parlaq olması səbəbindən yaranan texniki xəta faktı
D. Kompüter monitorlarının rənglərinin tələbə tərəfindən bəyənilməməsi ehtimalı vəziyyəti
ANSWER: A

Sosinsky-ə görə Özəl buludun qurulmasında "On-premise" anlayışı nəyi ifadə edir?
A. Bulud infrastrukturunun şirkətin öz fiziki binası daxilində yerləşməsi və idarəsini
B. Serverlərin yalnız kosmik stansiyalarda yerləşdirilməsi barədə olan gizli texniki layihə
C. İnternet sürətinin proqram vasitəsilə mütləq şəkildə hər saat başı sınaqdan keçirilməsi
D. Şirkət işçilərinin hamısının mütləq şəkildə eyni marka mobil telefondan istifadəsi
ANSWER: A

"Cloud Bursting" texnikası adətən hansı yerləşdirmə modelində tətbiq olunur?
A. Yerli resurslar çatmayanda ictimai buluda keçid edən Hibrid bulud modelində
B. Məlumatların yalnız bir dəfə oxunması üçün nəzərdə tutulan köhnə Özəl buludda
C. İnternet bağlantısı olmayan ucqar bölgələrdə qurulan kiçik İcma buludu növündə
D. Serverlərin tamamilə suyun altında yerləşdirildiyi xüsusi İctimai bulud mühitində
ANSWER: A

Özəl buludun (Private Cloud) ən böyük maliyyə çatışmazlığı hansı variantda qeyd olunub?
A. Avadanlıqların alınması və mütəxəssis saxlanılması üçün yüksək kapital xərcləri
B. Xidmətlərin yalnız kredit kartı ilə ödəniş edildiyi halda dərhal söndürülməsi riski
C. İnternet trafikinin provayder tərəfindən hər saniyə ölçülərək baha hesablanması
D. Serverlərin yerləşdiyi otağın divarlarının hər ay yenidən rənglənməsi məcburiyyəti
ANSWER: A

"Public Cloud" modelində infrastrukturun yenilənməsi kimin öhdəliyinə düşür?
A. Bulud xidmətini təqdim edən provayder şirkətin (məs. AWS, Azure) üzərinə
B. Proqramı kompüterinə yükləyən hər bir son istifadəçinin fərdi şəkildə öz üzərinə
C. Şirkətin ofisində çalışan təmizlik və texniki xidmət heyətinin ümumi məsuliyyətinə
D. İnternet kabellərini küçədən çəkən yerli rabitə idarəsinin mühəndisləri üzərinə
ANSWER: A

Hibrid bulud modelində "Data Sovereignty" (Məlumat suverenliyi) necə qorunur?
A. Kritik məlumatları ölkə daxilindəki özəl buludda, digərlərini isə xaricdə saxlamaqla
B. Bütün məlumatların internetdə hər kəs üçün açıq və şiffrəsiz şəkildə yayımlanması ilə
C. Serverlərin üzərinə mütləq şəkildə dövlət bayrağının şəklinin yapışdırılması yolu ilə
D. Şəbəkəyə qoşulan cihazların sayını hər gün dövlət orqanlarına hesabat verməklə
ANSWER: A

İcma buludunun (Community Cloud) idarəedilməsi adətən kim tərəfindən həyata keçirilir?
A. İcmaya daxil olan təşkilatların biri və ya üçüncü tərəf provayder tərəfindən
B. Dünyadakı bütün insanların iştirak etdiyi böyük bir onlayn səsvermə yolu ilə
C. İnternet sürətini ən yüksək səviyyədə təmin edən təsadüfi bir istifadəçi tərəfindən
D. Serverlərin markasına görə seçilən ən qədim istehsalçı şirkətin mühəndis heyəti
ANSWER: A

Özəl buludun (Private Cloud) ictimai buludla müqayisədə ən mühüm üstünlüyü nədir?
A. Məlumatlar və resurslar üzərində tam nəzarətin və yüksək təhlükəsizliyin olması
B. İnternet sürətinin hər zaman bütün dünyada eyni olması barədə verdiyi tam təminat
C. Avadanlıqların mülkiyyətinin provayder tərəfindən müştəriyə pulsuz hədiyyə edilməsi
D. Şəbəkə kabellərinin rənginin proqramın işləmə sürətinə göstərdiyi müsbət təsir
ANSWER: A

İctimai buludda "Vendor Lock-in" problemi müştəriyə necə təsir edə bilər?
A. Müştərinin bir provayderin texnologiyasından digərinə keçməsini çətinləşdirə bilər
B. Mağazada satılan bulud cihazlarının qutularının qıfıllanması vəziyyəti yarada bilər
C. İnternetə qoşulan zaman hər dəfə mürəkkəb riyazi məsələlərin həlli tələb oluna bilər
D. Şirkətin ofisindəki kompüterlərin sayını süni şəkildə artırmaq məcburiyyəti yaradır
ANSWER: A

Aşağıdakılardan hansı "Hibrid Bulud" arxitekturasının təməl komponentidir?
A. Özəl və ictimai bulud seqmentləri arasında məlumatların idarə olunan inteqrasiyası
B. Şəbəkə kabellərinin mütləq şəkildə həm fiber, həm də mis materialdan olması işi
C. Serverlərin yerləşdiyi otağın həm soyuq, həm də isti hava ilə təmin edilməsi qaydası
D. İstifadəçilərin həm kompüter, həm də yazı makinasından eyni vaxtda istifadə etməsi
ANSWER: A

Dövlət qurumlarının və ya bankların Özəl buluda üstünlük verməsinin əsas səbəbi nədir?
A. Qanunvericilik tələbləri, yüksək gizlilik və məlumatların daxildə qalması zərurəti
B. İnternet provayderlərinə ödənilən aylıq xidmət haqqından tamamilə azad olmaq istəyi
C. Serverlərin üzərindəki düymələrin rəngini hər gün dəyişmək imkanının olması faktı
D. Ofis daxilindəki kompüterlərin sayını bütün dünyaya nümayiş etdirmək məqsədi
ANSWER: A

"Managed Private Cloud" anlayışı Sosinsky-ə görə nəyi ifadə edir?
A. Özəl buludun fiziki olaraq kənarda bir provayder tərəfindən idarə edilməsini
B. Şirkət rəhbərliyinin hər gün serverləri əllə təmizləməsi barədə olan daxili əmri
C. İnternet sürətinin yalnız mühəndislər tərəfindən səsli komanda ilə artırılması işini
D. Serverlərin yerləşdiyi binaların hər ay başqa bir şəhərə köçürülməsi prosesini
ANSWER: A

"Public Cloud" mühitində miqyasa uyğunluq (Scalability) necə təmin edilir?
A. Müştərinin sorğusu ilə virtual resursların demək olar ki, limitsiz artırılması ilə
B. Fiziki serverlərin içindəki detalların müştəri tərəfindən kəlbətinlə dəyişməsi ilə
C. İnternetə qoşulan cihazların sayını proqram vasitəsilə mütləq şəkildə azaltmaqla
D. Şirkət işçilərinin sayının hər il mütləq şəkildə sabit saxlanılması barədə qərarla
ANSWER: A

Hibrid buludda "Orchestration" (Koordinasiya) nə üçün vacibdir?
A. Müxtəlif bulud mühitləri arasında tapşırıqların avtomatlaşdırılmış idarəsi üçün
B. Server otağında musiqi alətlərinin çalınması və işçilərin istirahəti üçün vasitə
C. İnternet provayderləri arasında ən ucuz qiyməti təklif edən şirkəti tapmaq işi
D. Virtual maşınların daxilindəki faylların yalnız əlifba sırası ilə düzülməsi qaydası
ANSWER: A

"Virtual Private Cloud" (VPC) anlayışını ictimai bulud daxilində necə izah etmək olar?
A. İctimai bulud daxilində müştəri üçün ayrılmış izolyasiya olunmuş məntiqi şəbəkə
B. Serverlərin daxili hissələrinin tozlanmasının qarşısını alan virtual filtr sistemi
C. Şəbəkəyə qoşulan zaman hər dəfə yeni bir ad və soyad seçmək məcburiyyəti işi
D. Kompüter monitorlarının parlaqlığını ətrafdakı işığa görə tənzimləyən daxili kod
ANSWER: A

Sosinsky-ə görə yerləşdirmə modelləri seçilərkən "Total Cost of Ownership" (TCO) nədir?
A. Infrastrukturun qurulması və saxlanılması üçün lazım olan bütün xərclərin cəmi
B. Şirkətin il ərzində satdığı məhsulların ümumi bazar qiymətinin orta hesabı miqdarı
C. Serverlərin çəkisinin ümumi tonla ifadə edilən fiziki göstəricisi barədə məlumat
D. İnternet provayderinin müştəriyə verdiyi endirim kuponlarının ümumi sayı və dəyəri
ANSWER: A

"OpenStack" kimi texnologiyalar adətən hansı bulud modelini qurmaq üçün istifadə edilir?
A. Müəssisə daxilində yüksək idarəetmə imkanları təklif edən Özəl bulud modelini
B. İnternet brauzerlərinin daxili kodlarını dəyişmək üçün nəzərdə tutulan PaaS mühiti
C. Yalnız mobil oyunların hazırlanması üçün istifadə olunan ictimai əyləncə buludu
D. Server otağındakı generatorların yağının dəyişdirilməsi üçün olan texniki təlimat
ANSWER: A

Hibrid buludun qurulmasında "Security Compliance" məsuliyyəti kimin üzərinə düşür?
A. Həm bulud provayderinin, həm də yerli infrastrukturu idarə edən müştərinin üzərinə
B. Şirkətin ofisində çalışan mühafizə xidmətinin və binanın komendantının üzərinə
C. İnternet vasitəsilə proqramları yükləyən hər bir tələbənin fərdi məsuliyyəti olaraq
D. Serverlərin markasına görə seçilən ən gənc istehsalçı şirkətin kuryerləri üzərinə
ANSWER: A

"Multi-cloud" strategiyası ilə "Hybrid Cloud" arasındakı əsas fərq nədən ibarətdir?
A. Multi-cloud bir neçə provayderin istifadəsidir, Hibrid isə fərqli modellərin vəhdətidir
B. Multi-cloud yalnız mobil cihazlar üçündür, Hibrid isə yalnız masaüstü kompüterlər
 C. Hibrid buludda internet bağlantısı mütləq deyil, Multi-cloud-da isə mütləqdir faktı
D. Bu iki termin texniki olaraq bir-birindən heç nə ilə fərqlənməyən eyni anlayışlardır
ANSWER: A

Bir universitetin bir neçə fakültəsi üçün ortaq resurs istifadəsi hansı modelə uyğundur?
A. Oxşar akademik missiyaları və şəbəkə ehtiyacları olduğu üçün İcma buludu modelinə
B. Hər bir tələbənin evində quraşdırılan fərdi və kiçik server sistemləri modelinə
C. İnternetdən tamamilə təcrid olunmuş və heç bir kənar çıxışı olmayan qapalı qutuya
D. Şəbəkə kabellərinin hər bir tələbənin çantasına fiziki olaraq bağlanması qaydasına
ANSWER: A

Yerləşdirmə modellərində "Agility" (Çeviklik) anlayışı nə üçün vacib hesab olunur?
A. Yeni biznes ideyalarını və tətbiqləri dərhal test edib istifadəyə vermək üçün
B. İşçilərin ofis daxilində daha sürətli qaçması və idman etməsi üçün nəzərdə tutulur
C. Serverlərin üzərindəki tozların xüsusi aparatlarla saniyə daxilində təmizlənməsi işi
D. İnternet paketlərinin bitməsi barədə istifadəçiyə zəng edib məlumat verilməsi üçün
ANSWER: A

Virtualizasiya texnologiyasının bulud hesablamalarında əsas rolu nədən ibarətdir?
A. Şəbəkə sürətini süni şəkildə artırmaq üçün istifadə edilən xidmət növü
B. Fiziki resursları abstraksiya edərək onların səmərəli bölünməsini təmin etmək
C. Kompüterin monitorundakı piksellərin sayını proqram vasitəsilə artırmaq işi
D. Serverlərin yerləşdiyi otağın divarlarının hər il yenidən rənglənməsi prosesi
E. Bütün proqramların lisenziyalarının disk vasitəsilə arxivlərdə saxlanılması
ANSWER: B

Type 1 (Bare-metal) hipervizorlar harada quraşdırılır və necə fəaliyyət göstərir?
A. Ümumi təyinatlı əməliyyat sisteminin (məs. Windows) üzərində bir tətbiq kimi
B. Birbaşa fiziki avadanlığın (hardware) üzərində, əməliyyat sistemi olmadan
C. Yalnız mobil telefonların daxili yaddaş kartlarının içində olan gizli fayl kimi
D. İnternet brauzerlərinin daxili kodlarını dəyişmək üçün nəzərdə tutulan alət kimi
E. Server otağındakı generatorların işləmə rejiminə nəzarət edən proqram kimi
ANSWER: B

Type 2 (Hosted) hipervizorunun Type 1-dən əsas fərqləndirici xüsusiyyəti nədir?
A. Fiziki serverin enerjisini kəsmədən onun daxili hissələrini təmizləmək imkanı
B. Virtual maşınların sayını mütləq şəkildə yalnız bir ədəd ilə məhdudlaşdırması
C. Mövcud olan əsas əməliyyat sisteminin daxilində bir proqram kimi işləməsi
D. Şəbəkə kabellərinin rənginə görə internet sürətini avtomatik tənzimləməsi işi
E. Prosessorun daxili tezliyini yalnız oyunlar üçün maksimum səviyyəyə qaldırması
ANSWER: C

Server virtualizasiyası (Server Virtualization) müəssisələrə hansı faydanı verir?
A. Bir fiziki serverdə bir neçə müstəqil virtual maşının eyni anda işləməsini
B. Ofis daxilindəki kompüterlərin sayını proqram vasitəsilə süni şəkildə gizlətməyi
C. İnternet provayderinə ödənilən aylıq vəsaitin mütləq şəkildə sıfıra endirilməsini
D. Klaviaturadakı düymələrin sıradan çıxma müddətini saniyələr daxilində ölçməyi
E. Data mərkəzindəki mühəndislərin maaşlarını avtomatik olaraq hesablamaq işini
ANSWER: A

"Storage Virtualization" (Yaddaş virtualizasiyası) texniki olaraq nəyi ifadə edir?
A. Çoxsaylı fiziki yaddaş qurğularının vahid bir məntiqi hovuz kimi idarə olunmasını
B. Faylların yalnız kağız üzərində çap edilərək qovluqlarda saxlanılması qaydasını
C. Disklərin fiziki ölçüsünün xüsusi alətlər vasitəsilə hər ay böyüdülməsi prosesini
D. İnternet üzərindən yüklənən şəkillərin rənglərinin avtomatik olaraq dəyişdirilməsini
E. Serverlərin yaddaşındakı məlumatların yalnız bir dəfə oxunması texniki xətasını
ANSWER: A

Virtual Maşının (VM) həyat dövründə "Provisioning" mərhələsi nəyi nəzərdə tutur?
A. Virtual maşın üçün lazımi resursların (CPU, RAM, Disk) ayrılması və yaradılmasını
B. Maşının tamamilə sıradan çıxaraq bütün məlumatların bazadan dərhal silinməsini
C. Prosessorun temperaturunun hər dəqiqə istifadəçiyə bildiriş kimi göndərilməsi işi
D. Virtual maşının daxilindəki faylların yalnız əlifba sırası ilə düzülməsi qaydasını
E. Şəbəkəyə qoşulan cihazların markasının provayder tərəfindən yoxlanılması prosesini
ANSWER: A

VM lifecycle daxilində "Migration" (Köçürmə) prosesi nə üçün həyata keçirilir?
A. Virtual maşının bir fiziki hostdan digərinə kəsintisiz olaraq daşınması üçün
B. İstifadəçi şifrələrinin hər həftə sonu mütləq başqa bir serverə kopyalanması üçün
C. Server otağındakı mebellərin yerinin hər ay mühəndislər tərəfindən dəyişməsi üçün
D. İnternet sürətinin proqram vasitəsilə yalnız gecə saatlarında artırılması məqsədilə
E. Kompüter monitorlarının rənglərinin tələbə tərəfindən bəyənilməsi üçün edilən iş
ANSWER: A

Virtualizasiyada "Hypervisor" (VMM) termininin tam açılışı və funksiyası nədir?
A. Şəbəkə trafikini ölçən və istifadəçilərə aylıq hesabat təqdim edən kiçik cihaz
B. Virtual maşınların yaradılmasını və resurs bölgüsünü idarə edən proqram qatı
C. Serverlərin daxili hissələrinin tozlanmasının qarşısını alan virtual filtr sistemi
D. İnternetə qoşulan zaman hər dəfə mürəkkəb riyazi məsələlərin həlli üçün alət
E. Klaviatura və siçan vasitəsilə bir neçə monitoru eyni vaxtda idarə edən mexanizm
ANSWER: B

"Snapshot" texnologiyasının virtualizasiyada əsas tətbiq sahəsi hansıdır?
A. Virtual maşının müəyyən zamandakı vəziyyətini yadda saxlayıb geri qayıtmaq üçün
B. Data mərkəzinə daxil olan mühəndislərin fotoşəkillərini çəkib bazada saxlamaq üçün
C. İnternet sürətinin saniyə daxilində dəyişməsini qeydə alan daxili rəqəmsal sayğac
D. Prosessorun nüvələrinin sayını proqram vasitəsilə süni şəkildə gizlətmək məqsədilə
E. Serverlərin yerləşdiyi otağın divar kağızlarının dizaynını mütəmadi dəyişmək üçün
ANSWER: A

VM lifecycle-ın "Decommissioning" (İstifadədən çıxarma) mərhələsində nə baş verir?
A. Virtual maşın birdəfəlik silinir və onun tutduğu bütün resurslar hovuza qaytarılır
B. Maşının daxilindəki prosessorun gücü avtomatik olaraq iki dəfə artırılaraq saxlanır
C. İnternet bağlantısı kəsildiyi zaman bütün məlumatlar mütləq buluda kopyalanır
D. Şəbəkəyə qoşulan cihazların markasına görə yeni lisenziyalar avtomatik alınır
E. Server otağındakı işıqların rəngi maşının silindiyini bildirmək üçün qırmızı olur
ANSWER: A

Sosinsky-ə görə "Full Virtualization" (Tam virtualizasiya) modelinin əsas üstünlüyü nədir?
A. Qonaq əməliyyat sisteminin (Guest OS) dəyişdirilmədən hipervizor üzərində işləməsi
B. Şəbəkə kabellərinin mütləq şəkildə həm fiber, həm də mis materialdan olması tələbi
C. Serverlərin yerləşdiyi otağın həm soyuq, həm də isti hava ilə təmin edilməsi qaydası
D. İstifadəçilərin həm kompüter, həm də yazı makinasından eyni vaxtda yararlanması işi
E. Bütün dünyadakı serverlərin eyni vaxtda mütləq şəkildə bir-birinə kopyalanması halı
ANSWER: A

"Para-virtualization" texnologiyasında Qonaq ƏS (Guest OS) hansı xüsusiyyətə malik olur?
A. Hipervizorla əlaqə qurmaq üçün onun nüvə (kernel) kodunda müəyyən dəyişiklik edilir
B. Əməliyyat sistemi özünü fiziki avadanlıq daxilində tək bir istifadəçi kimi hiss edir
C. İnternet sürətinin proqram vasitəsilə yalnız bir nəfər üçün artırılmasına icazə verir
D. Serverlərin yerləşdiyi binanın dəqiq xəritəsini internetdə hər kəsə nümayiş etdirir
E. Proqram təminatının interfeysindəki düymələrin sayını avtomatik olaraq azaldır işi
ANSWER: A

VMware ESXi və Microsoft Hyper-V (Bare-metal) hansı növ hipervizora aiddir?
A. Yalnız ofis daxilindəki istifadəçilər üçün nəzərdə tutulan kiçik Type 2 hipervizorlar
B. Fiziki avadanlıq üzərində birbaşa işləyən yüksək performanslı Type 1 hipervizorlar
C. İnternet brauzerlərinin daxili kodlarını dəyişmək üçün istifadə olunan daxili tətbiqlər
D. Serverlərin daxili hissələrini kəlbətin vasitəsilə tənzimləyən mexaniki proqramlar
E. Prosessorun temperaturunu tənzimləmək üçün istifadə olunan daxili soyutma aləti
ANSWER: B

"Hardware Abstraction Layer" (HAL) virtualizasiya mühitində hansı vəzifəni yerinə yetirir?
A. Proqram təminatı ilə fiziki avadanlıq arasında əlaqəni təmin edən aralıq qat rolunu
B. Mağazada satılan kompüterlərin qiymətini hər gün avtomatik olaraq yeniləyən sayt
C. İnternetə qoşulan cihazların markasını hər saniyə dəyişən mürəkkəb alqoritm seti
D. Server otağındakı mühəndislərin geyim formasına nəzarət edən mərkəzi proqram işi
E. Şəbəkə kabellərinin uzunluğunu sm-lə ölçən və bazada qeyd edən texniki sənəd növü
ANSWER: A

VM lifecycle-ın "Maintenance" (Baxım) mərhələsində adətən hansı işlər görülür?
A. Virtual maşının təhlükəsizlik yenilənmələrinin aparılması və performansın ölçülməsi
B. Şirkətin ofis binasının ölçüsünün genişləndirilməsi barədə rəsmi qərarın verilməsi
C. İnternet provayderinin müştəriyə verdiyi endirim kuponlarının sayının azaldılması
D. Serverlərin üzərindəki düymələrin rəngini hər gün fərqli bir rəngə boyamaq işi
E. Virtual maşınların daxilindəki faylların yalnız şəkillərdən ibarət olmasını yoxlamaq
ANSWER: A

"Guest OS" (Qonaq Əməliyyat Sistemi) virtualizasiya arxitekturasında harada yerləşir?
A. Fiziki serverin BIOS yaddaşının ən gizli və əlçatmaz olan texniki bölməsi daxilində
B. Hipervizor tərəfindən yaradılmış virtual maşının (VM) daxili mühiti daxilində
C. İnternet provayderinin mərkəzi ofisində yerləşən ən güclü serverin operativ yaddaşında
D. Kompüterin monitorunun arxa hissəsində yerləşən kiçik bir çip daxilində olan proqram
E. Data mərkəzindəki generatorların yanacaq miqdarını ölçən rəqəmsal idarəetmə panelində
ANSWER: B

Virtualizasiya zamanı "Over-provisioning" (Həddindən artıq ayırma) nəyə yol aça bilər?
A. Fiziki resursların (məs. RAM) çatışmazlığına və sistemin performansının düşməsinə
B. İnternet sürətinin proqram vasitəsilə mütləq şəkildə iki dəfə artırılması imkanına
C. Serverlərin yerləşdiyi otağın daha sərin və təmiz qalmasına kömək edən texniki amil
D. İstifadəçilərin sayını mütləq şəkildə sabit saxlamaq üçün görülən mühüm təhlükəsizlik tədbiri
E. Şəbəkə kabellərinin mütləq şəkildə yaşıl rəngli kabellərlə əvəz edilməsi zərurətinə
ANSWER: A

Erl-ə görə "Network Virtualization" (Şəbəkə virtualizasiyası) hansı imkanı yaradır?
A. Fiziki şəbəkə resurslarını proqram təminatı ilə idarə olunan virtual şəbəkələrə bölməyi
B. İnternet provayderinin bütün dünyadakı müştərilərini eyni vaxtda bir şəbəkədə görməyi
C. Kompüterlərin daxili hissələrini proqram vasitəsilə təmizləməyi təmin edən texnika növü
D. Şəbəkəyə qoşulan zaman hər dəfə mürəkkəb riyazi məsələlərin həlli üçün olan mexanizm
E. Server otağındakı işıqların monitor parlaqlığına görə avtomatik söndürülməsi qaydasını
ANSWER: A

"Resource Isolation" (Resursların təcrid olunması) prinsipi nə üçün vacibdir?
A. Bir virtual maşındakı xətanın və ya yüklənmənin digər VM-lərə təsir etməməsi üçün
B. İstifadəçilərin yalnız eyni marka kompüterlərdən istifadə etməsini təmin etmək üçün
C. Şirkətin daxili yazışmalarının yalnız kağız üzərində aparılmasını mütləq tələb etmək
D. İnternet bağlantısı kəsildiyi zaman bütün məlumatların avtomatik silinməsini önləmək
E. Serverlərin daxilindəki tozların mərkəzləşdirilmiş qaydada bir yerə yığılması prosesi
ANSWER: A

Oracle VirtualBox və VMware Workstation hansı tip hipervizorlara ən yaxşı nümunədir?
A. Fərdi istifadə üçün nəzərdə tutulan və ƏS üzərində işləyən Type 2 hipervizorlar
B. Böyük data mərkəzlərində birbaşa hardware üzərində işləyən Type 1 sistemlər
C. Yalnız mobil oyunların hazırlanması üçün istifadə olunan daxili əyləncə mühiti
D. Serverlərin daxili hissələrini kəlbətin vasitəsilə tənzimləyən mexaniki proqramlar
E. Prosessorun temperaturunu tənzimləmək üçün istifadə olunan daxili soyutma aləti
ANSWER: A

VM lifecycle-ın "Archiving" (Arxivləşdirmə) mərhələsinin əsas məqsədi nədir?
A. İstifadə olunmayan, lakin saxlanması vacib olan VM-ləri disk sahəsinə qənaət üçün sıxmaq
B. Virtual maşınların daxilindəki şəkillərin rənglərini avtomatik olaraq ağ-qara rəngə salmaq
C. İnternet provayderinə ödənilən aylıq vəsaitin gecikdirilməsi barədə səsli bildiriş vermək
D. Serverlərin yerləşdiyi otağın divarlarına mütəmadi olaraq köhnə qəzetləri yapışdırmaq işi
E. Prosessorun daxili tezliyini hər il mütləq şəkildə iki dəfə aşağı salmaq üçün edilən proses
ANSWER: A

Virtualizasiyada "Cloning" (Klonlaşdırma) əməliyyatı necə icra edilir?
A. Mövcud bir virtual maşının tam eynisinin (nüsxəsinin) sürətlə yaradılması vasitəsilə
B. Serverin fiziki detallarının mühəndis tərəfindən sökülərək yenisi ilə əvəz edilməsi ilə
C. İnternet sürətinin proqram vasitəsilə süni şəkildə saniyələr daxilində iki dəfə artırılması ilə
D. Şirkət rəhbərliyinin hər bir işçi üçün fərdi bir bulud provayderi seçməsi qərarı ilə
E. Klaviatura düymələrinin rənginin proqram təminatı ilə eyni rəngə boyanması texnikası ilə
ANSWER: A

"Hardware-assisted Virtualization" texnologiyası hansı komponentin dəstəyi ilə işləyir?
A. Prosessorun (CPU) daxili virtualizasiya komandaları (Intel VT-x və ya AMD-V) vasitəsilə
B. Şəbəkə kabellərinin mütləq şəkildə rezin materialdan hazırlanması və rənglənməsi yolu ilə
C. Server otağındakı mühəndislərin xüsusi rəqəmsal saatlar vasitəsilə verdiyi əmrlərlə
D. Kompüterin monitorundakı piksəllərin sayını hər saniyə dəyişən mürəkkəb proqramla
E. Data mərkəzindəki soyuducu ventilyatorların fırlanma sürətini ölçən daxili rəqəmsal cihaz
ANSWER: A

VM lifecycle daxilində "Start/Stop" əməliyyatları resurslara necə təsir edir?
A. Maşın dayandırıldıqda (Stop) prosessor və RAM azad olur, lakin disk sahəsi saxlanılır
B. Maşın söndürüldüyü an bütün dünyadakı internet sürəti avtomatik olaraq aşağı düşür faktı
C. Serverlərin daxili hissələri maşın dayandırılan zaman mütləq mühəndis tərəfindən təmizlənir
D. Virtual maşın dayanan kimi onun içindəki bütün fayllar dərhal və geri dönməz şəkildə silinir
E. Prosessorun temperaturu maşın dayandırılan zaman süni şəkildə mütləq şəkildə artırılır
ANSWER: A

Virtualizasiya mühitində "Fault Tolerance" (Xətalara dözümlülük) nəyi ifadə edir?
A. Bir host sıradan çıxdıqda VM-lərin dərhal digər hostda kəsintisiz işə davam etməsini
B. İstifadəçi şifrəsini üç dəfə səhv yazdıqda sistemin avtomatik olaraq tamamilə bağlanmasını
C. Şəbəkə kabellərinin bir-birinə dolaşması halında internet sürətinin artırılması texnikası
D. Serverlərin yerləşdiyi binanın pəncərələrinin mütləq şəkildə qapalı saxlanılması tələbini
E. Kompüterin monitorunun rənginin xəta zamanı dərhal yaşıl rəngə çevrilməsi prosesini
ANSWER: A

Data mərkəzi dizaynında "Tier" (Səviyyə) standartları əsasən hansı parametri ölçür?
A. Serverlərin daxili prosessorlarının istehsal ilini və texniki modelini
B. İnfrastrukturun əlçatanlıq dərəcəsini və xətalara qarşı dözümlülük səviyyəsini
C. Şəbəkə kabellərinin rənginin proqram təminatına göstərdiyi vizual təsirini
D. Data mərkəzində çalışan işçilərin sayını və onların orta aylıq maaşını
E. Server otağındakı divar kağızlarının dizaynını və otağın ümumi sahəsini
ANSWER: B

Bulud infrastrukturunda "Blade Server" arxitekturasının əsas üstünlüyü nədir?
A. Məkan və enerji səmərəliliyi təmin edərək sıx yerləşmə imkanı yaratması
B. Hər bir serverin mütləq şəkildə ayrı bir binada yerləşdirilməsi zərurəti
C. İnternet sürətinin proqram vasitəsilə mütləq şəkildə iki dəfə artırılması
D. Serverlərin daxili hissələrinin tozlanmasının qarşısını alan mexaniki filtr
E. Klaviatura və siçan vasitəsilə eyni vaxtda minlərlə ekranı idarə etmək işi
ANSWER: A

"Storage Area Network" (SAN) sisteminin NAS-dan fundamental texniki fərqi nədir?
A. Məlumatları fayl səviyyəsində deyil, blok səviyyəsində yüksək sürətlə ötürməsi
B. Yalnız kiçik ofislər üçün nəzərdə tutulan və ucuz disklərdən ibarət olması
C. İnternet bağlantısı olmadan məlumatların fiziki olaraq çap edilməsi qaydası
D. Prosessorun temperaturunu tənzimləmək üçün istifadə olunan daxili alət
E. Server otağındakı generatorların yanacaq miqdarını ölçən rəqəmsal panel
ANSWER: A

Data mərkəzlərində "PUE" (Power Usage Effectiveness) göstəricisi nəyi ifadə edir?
A. Şəbəkə kabellərinin mütləq şəkildə rezin materialdan hazırlanması tələbini
B. Mərkəzin ümumi enerji sərfiyyatının İT avadanlıqlarına olan nisbətini
C. İnternet provayderinin müştəriyə verdiyi endirim kuponlarının ümumi sayı
D. Serverlərin yerləşdiyi otağın rütubət səviyyəsinin həmişə sabit saxlanılması
E. Kompüter monitorlarının parlaqlığını ətrafdakı işığa görə tənzimləyən kod
ANSWER: B

"Top-of-Rack" (ToR) şəbəkə dizaynı data mərkəzində necə tətbiq olunur?
A. Şəbəkə kommutatorunun hər bir server şkafının yuxarı hissəsində yerləşməsi ilə
B. İnternet kabellərinin binanın damından birbaşa serverlərə birləşdirilməsi ilə
C. Serverlərin daxili hissələrinin tozlanmasını önləyən xüsusi təmizlik rejimi ilə
D. Proqram təminatının interfeysindəki düymələrin rəngini dəyişən daxili sistemlə
E. Data mərkəzinə giriş üçün mütləq şəkildə xüsusi idman formasının geyilməsi ilə

    // --- SİSTEMİN MƏNTİQİ ---
    let masterQuestions = [];
    let examQuestions = [], answers = {}, currentIndex = 0, skipsLeft = 5, timerInterval, timeLeft = 300;

    // Aiken mətni obyektə çevirən funksiya
    function parseAiken(text) {
        const blocks = text.trim().split(/\n\s*\n/);
        return blocks.map(block => {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            if (lines.length < 3) return null;
            const qText = lines[0];
            const ansLine = lines.find(l => l.toUpperCase().startsWith("ANSWER:"));
            if (!ansLine) return null;
            const correctLetter = ansLine.split(":")[1].trim().toUpperCase();
            const options = lines.filter(l => /^[A-E]\./.test(l)).map(l => ({
                text: l.substring(2).trim(),
                isCorrect: l[0].toUpperCase() === correctLetter
            }));
            return { qText, options };
        }).filter(q => q !== null);
    }

    // Səhifə açılan kimi Aiken suallarını analiz et
    function initSystem() {
        masterQuestions = parseAiken(AIKEN_DATA);
        console.log("Sistem hazır. Yüklənən sual sayı: " + masterQuestions.length);
        loadLeaderboard();
    }

    function saveScore(name, score) {
        // Yerli yaddaş
        let lb = JSON.parse(localStorage.getItem('exam_lb') || "[]");
        lb.push({ name, score });
        lb.sort((a, b) => b.score - a.score);
        localStorage.setItem('exam_lb', JSON.stringify(lb.slice(0, 15)));

        // Google Sheets
        if(SCRIPT_URL && SCRIPT_URL !== 'BURAYA_KOPYALADIGINIZ_URL_YAZIN') {
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name: name, score: score })
            });
        }
    }

    // İmtahanı başlat
    function startExam() {
        const name = document.getElementById('username').value.trim();
        if(!name) return alert("Adınızı yazın!");
        if(masterQuestions.length < 20) return alert("Bazadakı sual sayı kifayət deyil (Min. 20)!");

        document.getElementById('s-name').innerText = name;
        examQuestions = [...masterQuestions].sort(() => Math.random() - 0.5).slice(0, 20);
        examQuestions.forEach(q => q.options.sort(() => Math.random() - 0.5));
        
        timeLeft = 300;
        startTimer();
        showScreen('quiz-screen');
        renderExam();
    }

    // ... (Dəyişməyən digər funksiyalar: renderExam, updateUI, nextQ, prevQ, swapQuestion, confirmFinish) ...
    // Qeyd: Əvvəlki kodunuzdakı vizual hissələri (render və s.) olduğu kimi saxlayın.

    window.onload = initSystem;
</script>
